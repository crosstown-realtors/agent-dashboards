name: Update Crosstown-Lincolnway Leaderboard

on:
  schedule:
    - cron: '0 8 * * *'   # Every day at 8am UTC (3am CT)
  workflow_dispatch:        # Allow manual trigger

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Fetch data and rebuild leaderboard
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/build_leaderboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crosstown-lincolnway-leaderboard.html
          git diff --cached --quiet || git commit -m "Auto-update leaderboard $(date -u '+%Y-%m-%d')"
          git push
